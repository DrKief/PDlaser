# docker-compose.preview.yml
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pdl_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-preview_secure_password}
      POSTGRES_DB: pdl_db
    expose:
      - "5432"
    # Mount data in RAM so it wipes on restart
    tmpfs:
      - /var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - HOST_NAME=db
      - DATABASE_NAME=pdl_db
      - DATABASE_USER=pdl_user
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-preview_secure_password}
    expose:
      - "8080"
    # Mount uploads in RAM so they wipe on restart
    tmpfs:
      - /app/src/main/resources/images
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped