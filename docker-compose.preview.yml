services:
  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: pdl_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pdl_db
      PGDATA: /var/lib/postgresql/18/data
    expose:
      - "5432"
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdl_user -d pdl_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  garage:
    image: dxflrs/garage:v2.2.0
    env_file:
      - .env
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
    expose:
      - "3900"
    tmpfs:
      - /var/lib/garage/data
      - /var/lib/garage/meta
    volumes:
      - ./garage.toml:/etc/garage.toml
    command: ["/garage", "server"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3900"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  garage-init:
    image: alpine:3.23
    env_file:
      - .env
    depends_on:
      garage:
        condition: service_healthy # FIX: Wait for garage to be fully healthy
    network_mode: "service:garage"
    pid: "service:garage"
    environment:
      - ACCESS_KEY=${S3_ACCESS_KEY}
      - SECRET_KEY=${S3_SECRET_KEY}
      - BUCKET_NAME=pdl-images
      - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET}
    restart: "on-failure:3"
    entrypoint:
      - /bin/sh
      - -eu
      - -c
      - |
        G="chroot /proc/1/root /garage"
        echo "Waiting for Garage daemon..."
        for i in $$(seq 1 20); do
          if $$G node id -q 2>/dev/null; then break; fi
          sleep 2
        done
        if $$G status 2>&1 | grep -q "NO ROLE ASSIGNED"; then
          echo "Initializing single-node layout..."
          NODE_ID=$$($$G node id -q)
          $$G layout assign "$$NODE_ID" -z dc1 -c 1G
          $$G layout apply --version 1
        fi
        echo "Configuring bucket and credentials..."
        $$G key import --yes -n pdl-key "$$ACCESS_KEY" "$$SECRET_KEY" || true
        $$G bucket create "$$BUCKET_NAME" || true
        $$G bucket allow "$$BUCKET_NAME" --read --write --owner --key pdl-key || true
        echo "Garage S3 initialized successfully."

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - HOST_NAME=db
      - DATABASE_NAME=pdl_db
      - DATABASE_USER=pdl_user
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - APP_UNSPLASH_DATASET_DIR=/var/lib/pdl/datasets
      - APP_MODELS_DIR=/var/lib/pdl/models
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - S3_ENDPOINT=http://garage:3900
      - S3_REGION=garage
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=pdl-images
      - JWT_SECRET=${JWT_SECRET}
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK=WARN
    expose:
      - "8080"
    tmpfs:
      - /var/lib/pdl/datasets
      - /var/lib/pdl/models
    depends_on:
      db:
        condition: service_healthy
      garage:
        condition: service_healthy # FIX: Wait for garage to be fully healthy
    restart: unless-stopped
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "8080"
    depends_on:
      - backend
    restart: unless-stopped
    logging: *default-logging
    networks:
      - dokploy-network
      - default

networks:
  dokploy-network:
    external: true
