# docker-compose.yml
services:
  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: pdl_user
      # Hardcoded fallback intended STRICTLY for local zero-config development
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdl_secure_password}
      POSTGRES_DB: pdl_db
    ports:
      - "5432:5432"
    # Ephemeral storage by design: ensures a clean database state on every local restart
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdl_user -d pdl_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - HOST_NAME=db
      - DATABASE_NAME=pdl_db
      - DATABASE_USER=pdl_user
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-pdl_secure_password}
      - APP_IMAGE_DIRECTORY=/var/lib/pdl/images
      - APP_UNSPLASH_DATASET_DIR=/var/lib/pdl/datasets
    volumes:
      - ./datasets:/var/lib/pdl/datasets
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    depends_on:
      - backend
    restart: unless-stopped
