services:
  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: pdl_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdl_secure_password}
      POSTGRES_DB: pdl_db
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdl_user -d pdl_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  garage:
    image: dxflrs/garage:v2.2.0
    environment:
      - GARAGE_DEFAULT_ACCESS_KEY=GK_PDLASER_ADMIN
      - GARAGE_DEFAULT_SECRET_KEY=super_secret_garage_key_12345
      - GARAGE_DEFAULT_BUCKET=pdl-images
    ports:
      - "3900:3900" # S3 API
    tmpfs:
      - /var/lib/garage/data
      - /var/lib/garage/meta
    volumes:
      - ./garage.toml:/etc/garage.toml
    command: /garage server
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - HOST_NAME=db
      - DATABASE_NAME=pdl_db
      - DATABASE_USER=pdl_user
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-pdl_secure_password}
      - APP_IMAGE_DIRECTORY=/var/lib/pdl/images
      - APP_UNSPLASH_DATASET_DIR=/var/lib/pdl/datasets
      - APP_MODELS_DIR=/var/lib/pdl/models
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - S3_ENDPOINT=http://garage:3900
      - S3_REGION=garage
      - S3_ACCESS_KEY=GK_PDLASER_ADMIN
      - S3_SECRET_KEY=super_secret_garage_key_12345
      - S3_BUCKET=pdl-images
    volumes:
      - datasets:/var/lib/pdl/datasets
      - ./backend/models:/var/lib/pdl/models
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      garage:
        condition: service_started
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_LOG_LEVEL=warn
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  datasets:
