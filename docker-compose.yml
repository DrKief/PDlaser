# docker-compose.yml
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pdl_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdl_secure_password}
      POSTGRES_DB: pdl_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - HOST_NAME=db
      - DATABASE_NAME=pdl_db
      - DATABASE_USER=pdl_user
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-pdl_secure_password}
      - APP_IMAGE_DIRECTORY=/app/src/main/resources/images
    ports:
      - "8080:8080"
    volumes:
      - backend_images:/app/src/main/resources/images
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  backend_images:
