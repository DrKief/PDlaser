# docker-compose.prod.yml
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: pdl-db
    environment:
      POSTGRES_USER: pdl_user
      POSTGRES_PASSWORD: pdl_secure_password
      POSTGRES_DB: pdl_db
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pdl-backend
    environment:
      - HOST_NAME=db
      - DATABASE_NAME=pdl_db
      - DATABASE_USER=pdl_user
      - DATABASE_PASSWORD=pdl_secure_password
    expose:
      - "8080"
    volumes:
      - backend_images:/app/src/main/resources/images
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pdl-frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  backend_images: