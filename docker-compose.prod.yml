services:
  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: pdl_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pdl_db
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdl_user -d pdl_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  garage:
    image: dxflrs/garage:v2.2.0
    environment:
      - GARAGE_DEFAULT_ACCESS_KEY=${S3_ACCESS_KEY}
      - GARAGE_DEFAULT_SECRET_KEY=${S3_SECRET_KEY}
      - GARAGE_DEFAULT_BUCKET=pdl-images
    volumes:
      - garage_data:/var/lib/garage/data
      - garage_meta:/var/lib/garage/meta
      - ./garage.toml:/etc/garage.toml
    command: /garage server
    restart: unless-stopped
    logging: *default-logging

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - HOST_NAME=db
      - DATABASE_NAME=pdl_db
      - DATABASE_USER=pdl_user
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - APP_IMAGE_DIRECTORY=/var/lib/pdl/images
      - APP_MODELS_DIR=/var/lib/pdl/models
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - S3_ENDPOINT=http://garage:3900
      - S3_REGION=garage
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=pdl-images
    expose:
      - "8080"
    volumes:
      - backend_images:/var/lib/pdl/images # BUG FIX: This was incorrectly mapped to pgdata:/var/lib/postgresql previously
      - backend_models:/var/lib/pdl/models
    depends_on:
      db:
        condition: service_healthy
      garage:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    expose:
      - "9090"
    depends_on:
      - backend
    logging: *default-logging

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_LOG_LEVEL=warn
    expose:
      - "3000"
    depends_on:
      - prometheus
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "8080"
    depends_on:
      - backend
    restart: unless-stopped
    logging: *default-logging

volumes:
  pgdata:
  backend_images:
  backend_models:
  garage_data:
  garage_meta:
