# Trust standard private Docker network IP ranges (Traefik's internal IPs)
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
real_ip_header X-Forwarded-For;

# Track the actual user's IP for rate limiting
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=1r/s;

server {
    # Listen on 8080 for both IPv4 and IPv6
    listen 8080 default_server;
    listen [::]:8080 default_server;
    
    server_name _;
    
    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";

    # Body and buffer sizing
    client_max_body_size 100M;
    client_body_buffer_size 10M;
    proxy_buffers 8 5M;
    proxy_buffer_size 5M;

    # Pass the real user IP and protocol to the backend
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Serve the Vue.js frontend
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy routes to the Spring Boot Backend
    location /images {
        proxy_pass http://backend:8080/images;
    }

    location /auth/register {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://backend:8080/auth/register;
    }

    location /auth {
        proxy_pass http://backend:8080/auth;
    }

    location /admin/unsplash {
        proxy_pass http://backend:8080/admin/unsplash;
    }

    location /admin/users {
        proxy_pass http://backend:8080/admin/users;
    }
}