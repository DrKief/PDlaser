spring:
  threads:
    virtual:
      enabled: true
  config:
    import: optional:file:.env.properties
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: jdbc:postgresql://${HOST_NAME:localhost}:5432/${DATABASE_NAME:pdl-db}
    username: ${DATABASE_USER:default}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

jwt:
  secret: ${JWT_SECRET}

app:
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}
  unsplash:
    dataset-dir: ${DATASET_DIR:/var/lib/pdl/datasets}

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

s3:
  endpoint: ${S3_ENDPOINT:http://localhost:3900}
  region: ${S3_REGION:garage}
  access-key: ${S3_ACCESS_KEY}
  secret-key: ${S3_SECRET_KEY}
  bucket: ${S3_BUCKET:pdl-images}
